# Configuração Netlify para FinançasPRO

[build]
  # Diretório onde estão os arquivos estáticos
  publish = "."
  # Diretório das funções serverless
  functions = "netlify/functions"

# Configurações específicas para o ambiente de produção
[context.production]
  environment = { NODE_ENV = "production" }

# Configurações de redirecionamento
[[redirects]]
  # Permitir acesso direto às funções serverless
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  # Para URLs curtos para a API
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  # Redirecionar tudo para o index.html para SPA
  from = "/*"
  to = "/index.html"
  status = 200

# Configurações de cabeçalhos
[[headers]]
  for = "/*"
    [headers.values]
    Access-Control-Allow-Origin = "*"
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https://*.mongodb.net https://api.netlify.com https://*.netlify.app; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:;" 