# Configuração Netlify para FinançasPRO

[build]
  # Diretório que contém os arquivos estáticos (HTML, CSS, JS)
  publish = "."
  # Comando para construir o site estático (não necessário neste caso)
  command = "echo 'No build command needed'"
  # Diretório onde as funções serverless estão localizadas
  functions = "netlify/functions"

# Configurações específicas para o ambiente de produção
[context.production]
  environment = { NODE_ENV = "production" }

# Configurações específicas para o ambiente de desenvolvimento
[context.branch-deploy]
  environment = { NODE_ENV = "development" }

# Configurações de redirecionamento
[[redirects]]
  # Redirecionar chamadas de API para funções serverless
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  # Redirecionar chamadas sem rota para o index.html (SPA)
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["anonymous"]}

# Configurações de cabeçalhos
[[headers]]
  # Configurar cabeçalhos para todos os arquivos
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https://*.mongodb.net https://api.netlify.com https://*.netlify.app; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:;"
    Access-Control-Allow-Origin = "*" 